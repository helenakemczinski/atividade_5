<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //exemplo de uma função sem parâmetros:
        function saudacao() {
            console.log("Olá!");
        }

        saudacao();

        //exemplo de uma função com parâmetros:
        function saudacaoPersonalizada(nome) {
            console.log("Olá, " + nome + "!");
        }

        saudacaoPersonalizada("Helena");

        //exemplo de uma função que retorna um valor:
        function soma(a, b) {
            return a + b;
        }

        soma(5, 3);
    </script>
</body>
</html>
